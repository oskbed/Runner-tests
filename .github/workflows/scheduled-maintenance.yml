name: Scheduled Maintenance

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

jobs:
  maintenance:
    name: Mock weekly maintenance
    runs-on: ubuntu-latest
    steps:
      - name: Scan mock queue
        run: |
          duration=$((RANDOM % 50 + 10))
          echo "Sleeping for ${duration} seconds"
          sleep "${duration}"

      - name: Rotate mock data
        run: |
          duration=$((RANDOM % 50 + 10))
          echo "Sleeping for ${duration} seconds"
          sleep "${duration}"

      - name: Prune mock cache
        run: |
          duration=$((RANDOM % 50 + 10))
          echo "Sleeping for ${duration} seconds"
          sleep "${duration}"

      - name: Rebuild mock indexes
        run: |
          duration=$((RANDOM % 50 + 10))
          echo "Sleeping for ${duration} seconds"
          sleep "${duration}"

      - name: Send mock report
        run: |
          duration=$((RANDOM % 50 + 10))
          echo "Sleeping for ${duration} seconds"
          sleep "${duration}"
